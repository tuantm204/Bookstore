version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: Manhtuan04
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pManhtuan04"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - bookstore-net

  customer-service:
    build: ./customer-service
    ports:
      - "8001:8001"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
    networks:
      - bookstore-net
    restart: on-failure

  staff-service:
    build: ./staff-service
    ports:
      - "8002:8002"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
    networks:
      - bookstore-net
    restart: on-failure

  manager-service:
    build: ./manager-service
    ports:
      - "8003:8003"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
    networks:
      - bookstore-net
    restart: on-failure

  catalog-service:
    build: ./catalog-service
    ports:
      - "8004:8004"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
    networks:
      - bookstore-net
    restart: on-failure

  book-service:
    build: ./book-service
    ports:
      - "8005:8005"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
    networks:
      - bookstore-net
    restart: on-failure

  cart-service:
    build: ./cart-service
    ports:
      - "8006:8006"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
    networks:
      - bookstore-net
    restart: on-failure

  order-service:
    build: ./order-service
    ports:
      - "8007:8007"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
    networks:
      - bookstore-net
    restart: on-failure

  pay-service:
    build: ./pay-service
    ports:
      - "8008:8008"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
    networks:
      - bookstore-net
    restart: on-failure

  ship-service:
    build: ./ship-service
    ports:
      - "8009:8009"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
    networks:
      - bookstore-net
    restart: on-failure

  comment-rate-service:
    build: ./comment-rate-service
    ports:
      - "8010:8010"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
    networks:
      - bookstore-net
    restart: on-failure

  recommender-ai-service:
    build: ./recommender-ai-service
    ports:
      - "8011:8011"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
    networks:
      - bookstore-net
    restart: on-failure

  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - customer-service
      - staff-service
      - manager-service
      - catalog-service
      - book-service
      - cart-service
      - order-service
      - pay-service
      - ship-service
      - comment-rate-service
      - recommender-ai-service
    networks:
      - bookstore-net
    restart: on-failure

volumes:
  mysql_data:

networks:
  bookstore-net:
    driver: bridge
