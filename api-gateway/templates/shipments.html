<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookStore - Shipments</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f4f6f9;color:#333}
        .navbar{background:#2c3e50;color:#fff;padding:15px 30px;display:flex;justify-content:space-between;align-items:center}
        .navbar h1{font-size:24px}.nav-links a{color:#fff;text-decoration:none;margin-left:20px;font-size:16px}
        .nav-links a:hover{text-decoration:underline}
        .container{max-width:1100px;margin:30px auto;padding:0 20px}
        h2{margin-bottom:20px}
        .card{background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.1);margin-bottom:20px}
        .card h3{margin-bottom:15px}
        .form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
        .form-row input,.form-row select{flex:1;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:14px;min-width:120px}
        .btn{padding:10px 20px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:bold}
        .btn-primary{background:#3498db;color:#fff}.btn-primary:hover{background:#2980b9}
        .btn-success{background:#27ae60;color:#fff}.btn-success:hover{background:#219a52}
        .btn-danger{background:#e74c3c;color:#fff}.btn-danger:hover{background:#c0392b}
        .btn-sm{padding:6px 12px;font-size:12px}
        .badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:bold;color:#fff}
        .badge-preparing{background:#f39c12}.badge-shipped{background:#3498db}.badge-in_transit{background:#9b59b6}.badge-delivered{background:#27ae60}
        table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1)}
        th,td{padding:12px 15px;text-align:left;border-bottom:1px solid #eee}
        th{background:#2c3e50;color:#fff}tr:hover{background:#f8f9fa}
        .msg{padding:10px 15px;border-radius:6px;margin-bottom:15px;display:none}
        .msg.ok{background:#d4edda;color:#155724;display:block}
        .msg.err{background:#f8d7da;color:#721c24;display:block}
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>📚 BookStore</h1>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/pages/books.html">Books</a>
            <a href="/pages/cart.html">Cart</a>
            <a href="/pages/customers.html">Customers</a>
            <a href="/pages/orders.html">Orders</a>
        </div>
    </nav>
    <div class="container">
        <h2>🚚 Shipments Management</h2>
        <div id="msg" class="msg"></div>
        <div class="card">
            <h3>Create Shipment</h3>
            <div class="form-row">
                <input type="number" id="order_id" placeholder="Order ID">
                <input type="text" id="address" placeholder="Shipping Address">
                <input type="text" id="tracking_number" placeholder="Tracking Number">
                <select id="status">
                    <option value="preparing">Preparing</option>
                    <option value="shipped">Shipped</option>
                    <option value="in_transit">In Transit</option>
                    <option value="delivered">Delivered</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="addItem()">Create Shipment</button>
        </div>
        <table>
            <thead><tr><th>ID</th><th>Order</th><th>Address</th><th>Status</th><th>Tracking</th><th>Created</th><th>Actions</th></tr></thead>
            <tbody id="tbl"><tr><td colspan="7">Loading...</td></tr></tbody>
        </table>
    </div>
<script>
const API='/api',SVC='shipments';
const TOKEN=localStorage.getItem('access_token');
if(!TOKEN)window.location.href='/pages/login.html';
const _fetch=window.fetch;window.fetch=(url,opts={})=>{opts.headers={...(opts.headers||{}),'Authorization':'Bearer '+TOKEN};return _fetch(url,opts)};
function showMsg(t,ok){const e=document.getElementById('msg');e.textContent=t;e.className='msg '+(ok?'ok':'err');setTimeout(()=>e.className='msg',3000)}
async function load(){
    try{
        const r=await fetch(API+'/'+SVC+'/');const d=await r.json();
        const items=Array.isArray(d)?d:(d.results||[]);
        const tb=document.getElementById('tbl');
        if(!items.length){tb.innerHTML='<tr><td colspan="7">No shipments yet</td></tr>';return}
        tb.innerHTML=items.map(s=>`<tr>
            <td>${s.id}</td><td>#${s.order_id}</td><td>${s.address}</td>
            <td><span class="badge badge-${s.status}">${s.status}</span></td>
            <td>${s.tracking_number||'-'}</td>
            <td>${new Date(s.created_at).toLocaleDateString()}</td>
            <td>
                <button class="btn btn-success btn-sm" onclick="updateStatus(${s.id})">📦 Update</button>
                <button class="btn btn-danger btn-sm" onclick="del(${s.id})">🗑</button>
            </td></tr>`).join('');
    }catch(e){document.getElementById('tbl').innerHTML='<tr><td colspan="7">Error loading</td></tr>'}
}
async function addItem(){
    const data={order_id:document.getElementById('order_id').value,address:document.getElementById('address').value,tracking_number:document.getElementById('tracking_number').value,status:document.getElementById('status').value};
    if(!data.order_id||!data.address){showMsg('Order ID and Address required',false);return}
    const r=await fetch(API+'/'+SVC+'/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    if(r.ok){showMsg('Shipment created!',true);['order_id','address','tracking_number'].forEach(id=>document.getElementById(id).value='');load()}
    else{const e=await r.json();showMsg(JSON.stringify(e),false)}
}
async function updateStatus(id){
    const st=prompt('Enter status (preparing/shipped/in_transit/delivered):');
    if(!st)return;
    const r=await fetch(API+'/'+SVC+'/'+id+'/',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:st})});
    if(r.ok){showMsg('Status updated!',true);load()}else showMsg('Invalid status',false);
}
async function del(id){if(!confirm('Delete shipment #'+id+'?'))return;await fetch(API+'/'+SVC+'/'+id+'/',{method:'DELETE'});load()}
load();
</script>
</body>
</html>
