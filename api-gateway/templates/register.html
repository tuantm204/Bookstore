<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookStore - Register</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f4f6f9;color:#333;min-height:100vh;display:flex;flex-direction:column}
        .navbar{background:#2c3e50;color:#fff;padding:15px 30px;display:flex;justify-content:space-between;align-items:center}
        .navbar h1{font-size:24px}.nav-links a{color:#fff;text-decoration:none;margin-left:20px;font-size:16px}
        .nav-links a:hover{text-decoration:underline}
        .register-container{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
        .register-card{background:#fff;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,0.12);padding:40px;width:100%;max-width:480px}
        .register-card h2{text-align:center;color:#2c3e50;margin-bottom:8px;font-size:28px}
        .register-card .subtitle{text-align:center;color:#888;margin-bottom:30px;font-size:14px}
        .form-group{margin-bottom:18px}
        .form-group label{display:block;margin-bottom:6px;font-weight:600;color:#2c3e50;font-size:14px}
        .form-group input,.form-group select{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px;transition:border-color .3s}
        .form-group input:focus,.form-group select:focus{outline:none;border-color:#27ae60}
        .form-row{display:flex;gap:15px}
        .form-row .form-group{flex:1}
        .btn-register{width:100%;padding:14px;background:#27ae60;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:background .3s}
        .btn-register:hover{background:#219a52}
        .btn-register:disabled{background:#7dcea0;cursor:not-allowed}
        .msg{padding:12px 16px;border-radius:8px;margin-bottom:20px;display:none;font-size:14px}
        .msg.ok{background:#d4edda;color:#155724;display:block}
        .msg.err{background:#f8d7da;color:#721c24;display:block}
        .link-row{text-align:center;margin-top:20px;font-size:14px;color:#666}
        .link-row a{color:#3498db;text-decoration:none;font-weight:600}
        .link-row a:hover{text-decoration:underline}
        .icon{font-size:48px;text-align:center;margin-bottom:10px}
        .role-info{background:#eaf2ff;border-radius:8px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:#2c3e50}
        .role-info strong{color:#3498db}
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>📚 BookStore Microservices</h1>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/pages/login.html">Login</a>
            <a href="/pages/register.html">Register</a>
        </div>
    </nav>
    <div class="register-container">
        <div class="register-card">
            <div class="icon">📝</div>
            <h2>Đăng ký tài khoản</h2>
            <p class="subtitle">Tạo tài khoản mới để sử dụng BookStore</p>
            <div id="msg" class="msg"></div>
            <div class="role-info">
                <strong>Phân quyền:</strong> Admin → Manager → Staff → Customer.<br>
                Mỗi vai trò có quyền truy cập khác nhau trong hệ thống.
            </div>
            <div class="form-group">
                <label>Tên đăng nhập *</label>
                <input type="text" id="username" placeholder="Nhập username" autofocus>
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" placeholder="Nhập email">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Họ và tên</label>
                    <input type="text" id="full_name" placeholder="Nhập họ tên">
                </div>
                <div class="form-group">
                    <label>Vai trò</label>
                    <select id="role">
                        <option value="customer">👤 Customer</option>
                        <option value="staff">👨‍💼 Staff</option>
                        <option value="manager">👔 Manager</option>
                        <option value="admin">🛡️ Admin</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Mật khẩu * (tối thiểu 6 ký tự)</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu">
            </div>
            <div class="form-group">
                <label>Xác nhận mật khẩu *</label>
                <input type="password" id="password2" placeholder="Nhập lại mật khẩu">
            </div>
            <button class="btn-register" id="registerBtn" onclick="doRegister()">Đăng ký</button>
            <div class="link-row">
                Đã có tài khoản? <a href="/pages/login.html">Đăng nhập</a>
            </div>
        </div>
    </div>

    <script>
        const API = '/api/auth';

        // Check if already logged in
        const token = localStorage.getItem('access_token');
        if (token) {
            fetch(`${API}/me/`, { headers: { 'Authorization': `Bearer ${token}` } })
                .then(r => { if (r.ok) window.location.href = '/'; })
                .catch(() => {});
        }

        function showMsg(text, type) {
            const el = document.getElementById('msg');
            el.textContent = text;
            el.className = 'msg ' + type;
        }

        async function doRegister() {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const full_name = document.getElementById('full_name').value.trim();
            const role = document.getElementById('role').value;
            const password = document.getElementById('password').value;
            const password2 = document.getElementById('password2').value;

            if (!username || !email || !password) { showMsg('Vui lòng nhập đầy đủ các trường bắt buộc (*)', 'err'); return; }
            if (password.length < 6) { showMsg('Mật khẩu phải có tối thiểu 6 ký tự', 'err'); return; }
            if (password !== password2) { showMsg('Mật khẩu xác nhận không khớp', 'err'); return; }

            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.textContent = 'Đang đăng ký...';

            try {
                const resp = await fetch(`${API}/register/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, full_name, role })
                });
                const data = await resp.json();

                if (resp.ok) {
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showMsg('Đăng ký thành công! Đang chuyển hướng...', 'ok');
                    setTimeout(() => window.location.href = '/', 1000);
                } else {
                    // Format validation errors
                    let errMsg = '';
                    if (typeof data === 'object') {
                        for (const [key, val] of Object.entries(data)) {
                            errMsg += `${key}: ${Array.isArray(val) ? val.join(', ') : val}\n`;
                        }
                    }
                    showMsg(errMsg || 'Đăng ký thất bại', 'err');
                }
            } catch (e) {
                showMsg('Không thể kết nối đến server', 'err');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Đăng ký';
            }
        }

        // Enter key support
        document.getElementById('password2').addEventListener('keypress', e => {
            if (e.key === 'Enter') doRegister();
        });
    </script>
</body>
</html>
