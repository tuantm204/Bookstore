<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookStore - Login</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f4f6f9;color:#333;min-height:100vh;display:flex;flex-direction:column}
        .navbar{background:#2c3e50;color:#fff;padding:15px 30px;display:flex;justify-content:space-between;align-items:center}
        .navbar h1{font-size:24px}.nav-links a{color:#fff;text-decoration:none;margin-left:20px;font-size:16px}
        .nav-links a:hover{text-decoration:underline}
        .login-container{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
        .login-card{background:#fff;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,0.12);padding:40px;width:100%;max-width:420px}
        .login-card h2{text-align:center;color:#2c3e50;margin-bottom:8px;font-size:28px}
        .login-card .subtitle{text-align:center;color:#888;margin-bottom:30px;font-size:14px}
        .form-group{margin-bottom:20px}
        .form-group label{display:block;margin-bottom:6px;font-weight:600;color:#2c3e50;font-size:14px}
        .form-group input{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px;transition:border-color .3s}
        .form-group input:focus{outline:none;border-color:#3498db}
        .btn-login{width:100%;padding:14px;background:#3498db;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:background .3s}
        .btn-login:hover{background:#2980b9}
        .btn-login:disabled{background:#95c4e8;cursor:not-allowed}
        .msg{padding:12px 16px;border-radius:8px;margin-bottom:20px;display:none;font-size:14px}
        .msg.ok{background:#d4edda;color:#155724;display:block}
        .msg.err{background:#f8d7da;color:#721c24;display:block}
        .link-row{text-align:center;margin-top:20px;font-size:14px;color:#666}
        .link-row a{color:#3498db;text-decoration:none;font-weight:600}
        .link-row a:hover{text-decoration:underline}
        .icon{font-size:48px;text-align:center;margin-bottom:10px}
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>📚 BookStore Microservices</h1>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/pages/login.html">Login</a>
            <a href="/pages/register.html">Register</a>
        </div>
    </nav>
    <div class="login-container">
        <div class="login-card">
            <div class="icon">🔐</div>
            <h2>Đăng nhập</h2>
            <p class="subtitle">Đăng nhập để truy cập hệ thống BookStore</p>
            <div id="msg" class="msg"></div>
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="username" placeholder="Nhập username" autofocus>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu">
            </div>
            <button class="btn-login" id="loginBtn" onclick="doLogin()">Đăng nhập</button>
            <div class="link-row">
                Chưa có tài khoản? <a href="/pages/register.html">Đăng ký ngay</a>
            </div>
        </div>
    </div>

    <script>
        const API = '/api/auth';

        // Check if already logged in
        const token = localStorage.getItem('access_token');
        if (token) {
            fetch(`${API}/me/`, { headers: { 'Authorization': `Bearer ${token}` } })
                .then(r => { if (r.ok) window.location.href = '/'; })
                .catch(() => {});
        }

        function showMsg(text, type) {
            const el = document.getElementById('msg');
            el.textContent = text;
            el.className = 'msg ' + type;
        }

        async function doLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (!username || !password) { showMsg('Vui lòng nhập đầy đủ thông tin', 'err'); return; }

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'Đang đăng nhập...';

            try {
                const resp = await fetch(`${API}/login/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await resp.json();

                if (resp.ok) {
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showMsg('Đăng nhập thành công! Đang chuyển hướng...', 'ok');
                    setTimeout(() => window.location.href = '/', 1000);
                } else {
                    showMsg(data.error || 'Đăng nhập thất bại', 'err');
                }
            } catch (e) {
                showMsg('Không thể kết nối đến server', 'err');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Đăng nhập';
            }
        }

        // Enter key support
        document.getElementById('password').addEventListener('keypress', e => {
            if (e.key === 'Enter') doLogin();
        });
        document.getElementById('username').addEventListener('keypress', e => {
            if (e.key === 'Enter') document.getElementById('password').focus();
        });
    </script>
</body>
</html>
