<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookStore - Books</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f4f6f9;color:#333}
        .navbar{background:#2c3e50;color:#fff;padding:15px 30px;display:flex;justify-content:space-between;align-items:center}
        .navbar h1{font-size:24px}.nav-links a{color:#fff;text-decoration:none;margin-left:20px;font-size:16px}
        .nav-links a:hover{text-decoration:underline}
        .container{max-width:1100px;margin:30px auto;padding:0 20px}
        h2{margin-bottom:20px}
        .card{background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.1);margin-bottom:20px}
        .card h3{margin-bottom:15px}
        .form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
        .form-row input,.form-row select{flex:1;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:14px;min-width:120px}
        .btn{padding:10px 20px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:bold}
        .btn-primary{background:#3498db;color:#fff}.btn-primary:hover{background:#2980b9}
        .btn-success{background:#27ae60;color:#fff}.btn-success:hover{background:#219a52}
        .btn-danger{background:#e74c3c;color:#fff}.btn-danger:hover{background:#c0392b}
        .btn-sm{padding:6px 12px;font-size:12px}
        table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1)}
        th,td{padding:12px 15px;text-align:left;border-bottom:1px solid #eee}
        th{background:#2c3e50;color:#fff}tr:hover{background:#f8f9fa}
        .msg{padding:10px 15px;border-radius:6px;margin-bottom:15px;display:none}
        .msg.ok{background:#d4edda;color:#155724;display:block}
        .msg.err{background:#f8d7da;color:#721c24;display:block}
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>📚 BookStore</h1>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/pages/books.html">Books</a>
            <a href="/pages/cart.html">Cart</a>
            <a href="/pages/customers.html">Customers</a>
            <a href="/pages/orders.html">Orders</a>
        </div>
    </nav>
    <div class="container">
        <h2>📖 Books Management</h2>
        <div id="msg" class="msg"></div>
        <div class="card">
            <h3>Add New Book</h3>
            <div class="form-row">
                <input type="text" id="title" placeholder="Title">
                <input type="text" id="author" placeholder="Author">
                <input type="number" id="price" placeholder="Price" step="0.01">
                <input type="number" id="stock" placeholder="Stock">
            </div>
            <button class="btn btn-primary" onclick="addItem()">Add Book</button>
        </div>
        <table>
            <thead><tr><th>ID</th><th>Title</th><th>Author</th><th>Price</th><th>Stock</th><th>Actions</th></tr></thead>
            <tbody id="tbl"><tr><td colspan="6">Loading...</td></tr></tbody>
        </table>
    </div>
<script>
const API='/api';
const TOKEN=localStorage.getItem('access_token');
if(!TOKEN)window.location.href='/pages/login.html';
const _fetch=window.fetch;window.fetch=(url,opts={})=>{opts.headers={...(opts.headers||{}),'Authorization':'Bearer '+TOKEN};return _fetch(url,opts)};
function showMsg(t,ok){const e=document.getElementById('msg');e.textContent=t;e.className='msg '+(ok?'ok':'err');setTimeout(()=>e.className='msg',3000)}
async function load(){
    try{
        const r=await fetch(API+'/books/');const d=await r.json();
        const items=Array.isArray(d)?d:(d.results||[]);
        const tb=document.getElementById('tbl');
        if(!items.length){tb.innerHTML='<tr><td colspan="6">No books yet</td></tr>';return}
        tb.innerHTML=items.map(b=>`<tr>
            <td>${b.id}</td><td>${b.title}</td><td>${b.author}</td>
            <td>$${parseFloat(b.price).toFixed(2)}</td><td>${b.stock}</td>
            <td>
                <button class="btn btn-success btn-sm" onclick="addToCart(${b.id})">🛒 Cart</button>
                <button class="btn btn-danger btn-sm" onclick="del(${b.id})">🗑</button>
            </td></tr>`).join('');
    }catch(e){document.getElementById('tbl').innerHTML='<tr><td colspan="6">Error loading</td></tr>'}
}
async function addItem(){
    const data={title:document.getElementById('title').value,author:document.getElementById('author').value,price:document.getElementById('price').value,stock:document.getElementById('stock').value||0};
    if(!data.title||!data.author||!data.price){showMsg('Fill title, author, price',false);return}
    const r=await fetch(API+'/books/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    if(r.ok){showMsg('Book added!',true);['title','author','price','stock'].forEach(id=>document.getElementById(id).value='');load()}
    else showMsg('Error adding book',false);
}
async function del(id){if(!confirm('Delete #'+id+'?'))return;await fetch(API+'/books/'+id+'/',{method:'DELETE'});load()}
async function addToCart(bookId){
    const cid=prompt('Enter Customer ID:');if(!cid)return;
    try{
        const cr=await fetch(API+'/carts/customer/'+cid+'/');const cart=await cr.json();
        if(cart.error){showMsg('Cart not found. Create customer first.',false);return}
        const r=await fetch(API+'/cart-items/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cart:cart.id,book_id:bookId,quantity:1})});
        if(r.ok)showMsg('Added to cart!',true);else{const e=await r.json();showMsg(JSON.stringify(e),false)}
    }catch(e){showMsg('Error: '+e.message,false)}
}
load();
</script>
</body>
</html>
