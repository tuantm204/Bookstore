<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Chi tiết sách - BookStore</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f8fafc;color:#1e293b}
a{text-decoration:none;color:inherit}
header{background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.08);position:sticky;top:0;z-index:100}
.header-wrap{max-width:1280px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;gap:24px}
.logo{font-size:24px;font-weight:800;color:#2563eb}.logo i{margin-right:6px}
.search-box{flex:1;max-width:520px;position:relative}
.search-box input{width:100%;padding:10px 44px 10px 16px;border:2px solid #e2e8f0;border-radius:10px;font-size:14px;font-family:inherit}
.search-box input:focus{outline:none;border-color:#2563eb}
.search-box button{position:absolute;right:4px;top:4px;bottom:4px;width:36px;border:none;background:#2563eb;color:#fff;border-radius:8px;cursor:pointer}
.header-actions{display:flex;align-items:center;gap:16px}
.header-actions a,.header-actions button{background:none;border:none;color:#64748b;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;transition:color .2s}
.header-actions a:hover{color:#2563eb}
.cart-badge{position:relative}
.cart-badge .count{position:absolute;top:-6px;right:-10px;background:#ef4444;color:#fff;font-size:10px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.breadcrumb{max-width:1280px;margin:0 auto;padding:16px 24px;font-size:13px;color:#94a3b8}
.breadcrumb a{color:#64748b}.breadcrumb a:hover{color:#2563eb}

.detail-wrap{max-width:1280px;margin:0 auto;padding:0 24px 48px}
.book-detail{background:#fff;border-radius:16px;padding:32px;box-shadow:0 1px 3px rgba(0,0,0,.06);display:grid;grid-template-columns:340px 1fr;gap:40px;margin-bottom:32px}
.book-img{border-radius:12px;height:400px;display:flex;align-items:center;justify-content:center;font-size:120px}
.book-meta h1{font-size:28px;font-weight:700;margin-bottom:8px;line-height:1.3}
.book-meta .author-line{font-size:16px;color:#64748b;margin-bottom:16px}
.book-meta .author-line i{margin-right:4px}
.book-meta .rating{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.star{color:#f59e0b;font-size:18px}
.star.empty{color:#e2e8f0}
.rating-text{font-size:14px;color:#64748b}
.book-meta .price-tag{font-size:32px;font-weight:800;color:#dc2626;margin-bottom:4px}
.book-meta .stock-info{font-size:14px;margin-bottom:20px}
.stock-green{color:#16a34a}.stock-yellow{color:#ca8a04}.stock-red{color:#dc2626}
.qty-row{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.qty-ctrl{display:flex;align-items:center;border:2px solid #e2e8f0;border-radius:10px;overflow:hidden}
.qty-ctrl button{width:40px;height:40px;border:none;background:#f8fafc;cursor:pointer;font-size:18px;font-weight:700;color:#475569}
.qty-ctrl button:hover{background:#e2e8f0}
.qty-ctrl input{width:50px;height:40px;border:none;border-left:2px solid #e2e8f0;border-right:2px solid #e2e8f0;text-align:center;font-size:16px;font-weight:600;font-family:inherit}
.btn-add-cart{padding:12px 32px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px;transition:background .2s}
.btn-add-cart:hover{background:#1d4ed8}
.btn-add-cart:disabled{opacity:.5;cursor:not-allowed}
.btn-buy-now{padding:12px 32px;background:#dc2626;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px}
.btn-buy-now:hover{background:#b91c1c}
.book-features{display:flex;gap:24px;margin-top:20px;padding-top:20px;border-top:1px solid #f1f5f9}
.book-features div{display:flex;align-items:center;gap:8px;font-size:13px;color:#64748b}
.book-features i{color:#2563eb}

/* Tabs */
.tabs{display:flex;border-bottom:2px solid #f1f5f9;margin-bottom:24px;gap:0}
.tab-btn{padding:12px 24px;font-size:15px;font-weight:600;color:#64748b;border:none;background:none;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab-btn:hover,.tab-btn.active{color:#2563eb;border-bottom-color:#2563eb}
.tab-content{display:none}.tab-content.active{display:block}

/* Reviews */
.review-card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.review-header{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.review-avatar{width:40px;height:40px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-weight:700;color:#2563eb;font-size:16px}
.review-name{font-weight:600;font-size:14px}
.review-date{font-size:12px;color:#94a3b8}
.review-stars{margin-bottom:8px}
.review-text{font-size:14px;color:#475569;line-height:1.6}

/* Review form */
.review-form{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:24px}
.review-form h3{font-size:16px;font-weight:700;margin-bottom:16px}
.star-input{display:flex;gap:4px;margin-bottom:12px}
.star-input i{font-size:24px;color:#e2e8f0;cursor:pointer;transition:color .2s}
.star-input i.active,.star-input i:hover{color:#f59e0b}
.review-form textarea{width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:10px;font-size:14px;font-family:inherit;resize:vertical;min-height:80px}
.review-form textarea:focus{outline:none;border-color:#2563eb}
.btn-review{margin-top:12px;padding:10px 24px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-family:inherit}

.empty{text-align:center;padding:40px;color:#94a3b8}
.skeleton{background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

@media(max-width:768px){.book-detail{grid-template-columns:1fr}.book-img{height:240px}}

/* Toast */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column-reverse;gap:10px}
.toast{display:flex;align-items:center;gap:12px;padding:14px 20px;border-radius:12px;color:#fff;font-size:14px;font-weight:500;font-family:'Inter',sans-serif;box-shadow:0 8px 32px rgba(0,0,0,.18);animation:toastIn .4s ease;min-width:280px;max-width:420px;backdrop-filter:blur(8px)}
.toast.success{background:linear-gradient(135deg,#16a34a,#15803d)}
.toast.error{background:linear-gradient(135deg,#dc2626,#b91c1c)}
.toast.info{background:linear-gradient(135deg,#2563eb,#1d4ed8)}
.toast i{font-size:18px;flex-shrink:0}
.toast .toast-msg{flex:1}
.toast .toast-close{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:16px;padding:0 0 0 8px;transition:color .2s}
.toast .toast-close:hover{color:#fff}
.toast.hide{animation:toastOut .3s ease forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(80px) scale(.95)}to{opacity:1;transform:translateX(0) scale(1)}}
@keyframes toastOut{to{opacity:0;transform:translateX(80px) scale(.95)}}
</style>
</head>
<body>

<header>
<div class="header-wrap">
<a href="/" class="logo"><i class="fas fa-book-open"></i>BookStore</a>
<div class="search-box">
<input type="text" placeholder="Tìm kiếm sách..." onkeydown="if(event.key==='Enter')location.href='/pages/store.html?q='+this.value">
<button onclick="location.href='/pages/store.html?q='+this.previousElementSibling.value"><i class="fas fa-search"></i></button>
</div>
<div class="header-actions" id="headerActions"></div>
</div>
</header>

<div class="breadcrumb">
<a href="/"><i class="fas fa-home"></i> Trang chủ</a> &rsaquo; <a href="/pages/store.html">Cửa hàng</a> &rsaquo; <span id="bcTitle">...</span>
</div>

<div class="detail-wrap">
<div class="book-detail" id="bookDetail">
<div class="book-img skeleton" style="height:400px"></div>
<div>
<div class="skeleton" style="height:36px;border-radius:8px;margin-bottom:12px"></div>
<div class="skeleton" style="height:20px;width:40%;border-radius:8px;margin-bottom:24px"></div>
<div class="skeleton" style="height:40px;width:30%;border-radius:8px;margin-bottom:16px"></div>
<div class="skeleton" style="height:48px;width:60%;border-radius:8px"></div>
</div>
</div>

<div class="tabs">
<button class="tab-btn active" onclick="switchTab('reviews')">💬 Đánh giá</button>
<button class="tab-btn" onclick="switchTab('details')">📋 Thông tin chi tiết</button>
</div>

<div class="tab-content active" id="tab-reviews">
<div class="review-form" id="reviewForm" style="display:none">
<h3>Viết đánh giá</h3>
<div class="star-input" id="starInput"></div>
<textarea id="reviewText" placeholder="Chia sẻ cảm nhận của bạn về cuốn sách này..."></textarea>
<button class="btn-review" onclick="submitReview()"><i class="fas fa-paper-plane"></i> Gửi đánh giá</button>
</div>
<div id="reviewsList"><div class="empty">Đang tải đánh giá...</div></div>
</div>
<div class="tab-content" id="tab-details">
<div class="review-card">
<table style="width:100%;font-size:14px">
<tr><td style="padding:8px;font-weight:600;width:160px;color:#64748b">Mã sách</td><td id="dId" style="padding:8px">-</td></tr>
<tr><td style="padding:8px;font-weight:600;color:#64748b">Tên sách</td><td id="dTitle" style="padding:8px">-</td></tr>
<tr><td style="padding:8px;font-weight:600;color:#64748b">Tác giả</td><td id="dAuthor" style="padding:8px">-</td></tr>
<tr><td style="padding:8px;font-weight:600;color:#64748b">Giá</td><td id="dPrice" style="padding:8px">-</td></tr>
<tr><td style="padding:8px;font-weight:600;color:#64748b">Kho</td><td id="dStock" style="padding:8px">-</td></tr>
<tr><td style="padding:8px;font-weight:600;color:#64748b">Ngày thêm</td><td id="dDate" style="padding:8px">-</td></tr>
</table>
</div>
</div>
</div>

<div id="toast-container"></div>

<script>
function showToast(msg,type='success',duration=3000){
    const t=document.createElement('div');t.className='toast '+type;
    const icons={success:'fa-circle-check',error:'fa-circle-xmark',info:'fa-circle-info'};
    t.innerHTML=`<i class="fas ${icons[type]||icons.info}"></i><span class="toast-msg">${msg}</span><button class="toast-close" onclick="this.parentElement.classList.add('hide');setTimeout(()=>this.parentElement.remove(),300)"><i class="fas fa-times"></i></button>`;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(()=>{if(t.parentElement){t.classList.add('hide');setTimeout(()=>t.remove(),300)}},duration);
}

const API='/api',token=localStorage.getItem('access_token'),userStr=localStorage.getItem('user');
let currentUser=null,bookId=new URLSearchParams(location.search).get('id'),bookData=null,selectedRating=5;
const coverColors=['#dbeafe','#fce7f3','#dcfce7','#fef9c3','#f3e8ff','#ffedd5'];
function authFetch(url,o={}){if(token){o.headers={...(o.headers||{}),'Authorization':'Bearer '+token}}return fetch(url,o)}

(function(){
    const el=document.getElementById('headerActions');
    if(token&&userStr){try{currentUser=JSON.parse(userStr)}catch(e){}}
    if(currentUser){
        el.innerHTML=`<a href="/pages/my-cart.html" class="cart-badge"><i class="fas fa-shopping-cart fa-lg"></i><span class="count" id="cartCount">0</span></a>
        <a href="/pages/my-profile.html" style="color:#2563eb;font-weight:600"><i class="fas fa-user-circle"></i> ${currentUser.full_name||currentUser.username}</a>`;
        loadCartCount();
    }else{
        el.innerHTML=`<a href="/pages/login.html" style="background:#2563eb;color:#fff;padding:8px 20px;border-radius:8px;font-weight:600">Đăng nhập</a>`;
    }
})();

async function loadCartCount(){
    const cid=localStorage.getItem('customer_id');if(!cid)return;
    try{const r=await authFetch(API+'/carts/customer/'+cid+'/');if(r.ok){const d=await r.json();const c=document.getElementById('cartCount');if(c)c.textContent=(d.items||[]).length}}catch(e){}
}

function switchTab(name){
    document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',b.textContent.includes(name==='reviews'?'Đánh giá':'Thông tin')));
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    document.getElementById('tab-'+name).classList.add('active');
}

async function loadBook(){
    if(!bookId){document.getElementById('bookDetail').innerHTML='<div class="empty">Không tìm thấy sách</div>';return}
    try{
        const r=await authFetch(API+'/books/'+bookId+'/');
        if(!r.ok)throw new Error();
        bookData=await r.json();
        const b=bookData;
        const color=coverColors[b.id%coverColors.length];
        const stockClass=b.stock>5?'stock-green':b.stock>0?'stock-yellow':'stock-red';
        const stockText=b.stock>5?`Còn ${b.stock} sản phẩm`:b.stock>0?`Chỉ còn ${b.stock} sản phẩm`:'Hết hàng';

        document.getElementById('bcTitle').textContent=b.title;
        document.title=b.title+' - BookStore';

        document.getElementById('bookDetail').innerHTML=`
            <div class="book-img" style="background:${color};font-size:120px">${['📖','📚','📘','📗','📕'][b.id%5]}</div>
            <div class="book-meta">
                <h1>${b.title}</h1>
                <div class="author-line"><i class="fas fa-user-pen"></i> ${b.author}</div>
                <div class="rating" id="avgRating"></div>
                <div class="price-tag">$${parseFloat(b.price).toFixed(2)}</div>
                <div class="stock-info ${stockClass}"><i class="fas fa-box"></i> ${stockText}</div>
                <div class="qty-row">
                    <div class="qty-ctrl">
                        <button onclick="changeQty(-1)">−</button>
                        <input type="number" id="qty" value="1" min="1" max="${b.stock}">
                        <button onclick="changeQty(1)">+</button>
                    </div>
                    <button class="btn-add-cart" onclick="addToCart()" ${b.stock<1?'disabled':''}><i class="fas fa-cart-plus"></i> Thêm vào giỏ</button>
                </div>
                <div class="book-features">
                    <div><i class="fas fa-truck-fast"></i> Giao nhanh 2-3 ngày</div>
                    <div><i class="fas fa-shield-halved"></i> Chính hãng 100%</div>
                    <div><i class="fas fa-rotate-left"></i> Đổi trả 7 ngày</div>
                </div>
            </div>`;

        // Detail tab
        document.getElementById('dId').textContent=b.id;
        document.getElementById('dTitle').textContent=b.title;
        document.getElementById('dAuthor').textContent=b.author;
        document.getElementById('dPrice').textContent='$'+parseFloat(b.price).toFixed(2);
        document.getElementById('dStock').textContent=b.stock;
        document.getElementById('dDate').textContent=new Date(b.created_at).toLocaleDateString('vi-VN');
    }catch(e){document.getElementById('bookDetail').innerHTML='<div class="empty"><i class="fas fa-exclamation-triangle" style="font-size:48px;margin-bottom:16px;display:block"></i>Không thể tải thông tin sách</div>'}
}

function changeQty(d){const inp=document.getElementById('qty');let v=parseInt(inp.value)+d;if(v<1)v=1;if(bookData&&v>bookData.stock)v=bookData.stock;inp.value=v}

async function addToCart(){
    if(!token){location.href='/pages/login.html';return}
    const cid=localStorage.getItem('customer_id');
    if(!cid){showToast('Vui lòng cập nhật hồ sơ khách hàng','info');setTimeout(()=>location.href='/pages/my-profile.html',1500);return}
    const qty=parseInt(document.getElementById('qty').value)||1;
    try{
        const r=await authFetch(API+'/customers/'+cid+'/cart/add-item/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({book_id:bookId,quantity:qty})});
        if(r.ok){loadCartCount();showToast('🛒 Đã thêm '+qty+' sách vào giỏ hàng!','success')}
        else{const d=await r.json();showToast(d.error||'Không thể thêm vào giỏ','error')}
    }catch(e){showToast('Lỗi kết nối, vui lòng thử lại','error')}
}

// Reviews
async function loadReviews(){
    try{
        const r=await authFetch(API+'/comments/');
        if(!r.ok)throw new Error();
        const d=await r.json();const all=Array.isArray(d)?d:(d.results||[]);
        const reviews=all.filter(c=>c.book_id==bookId);

        // Show avg rating
        if(reviews.length){
            const avg=reviews.reduce((s,c)=>s+(c.rating||5),0)/reviews.length;
            const avgEl=document.getElementById('avgRating');
            if(avgEl)avgEl.innerHTML=starsHTML(avg)+`<span class="rating-text">${avg.toFixed(1)} (${reviews.length} đánh giá)</span>`;
        }

        // Show review form if logged in
        if(currentUser){
            document.getElementById('reviewForm').style.display='block';
            const si=document.getElementById('starInput');
            si.innerHTML='';
            for(let i=1;i<=5;i++){
                const star=document.createElement('i');
                star.className=i<=selectedRating?'fas fa-star active':'fas fa-star';
                star.onclick=()=>{selectedRating=i;document.querySelectorAll('#starInput i').forEach((s,idx)=>s.classList.toggle('active',idx<i))};
                si.appendChild(star);
            }
        }

        const list=document.getElementById('reviewsList');
        list.innerHTML=reviews.length?reviews.map(c=>`
            <div class="review-card">
                <div class="review-header">
                    <div class="review-avatar">${(''+(c.customer_id||'?'))[0].toUpperCase()}</div>
                    <div><div class="review-name">Khách hàng #${c.customer_id||'?'}</div><div class="review-date">${new Date(c.created_at).toLocaleDateString('vi-VN')}</div></div>
                </div>
                <div class="review-stars">${starsHTML(c.rating||5)}</div>
                <div class="review-text">${c.content||c.comment||''}</div>
            </div>
        `).join(''):'<div class="empty"><i class="fas fa-comment-dots" style="font-size:36px;margin-bottom:12px;display:block"></i>Chưa có đánh giá nào. Hãy là người đầu tiên!</div>';
    }catch(e){document.getElementById('reviewsList').innerHTML='<div class="empty">Không thể tải đánh giá</div>'}
}

function starsHTML(rating){
    let html='';
    for(let i=1;i<=5;i++)html+=`<span class="star${i<=Math.round(rating)?'':' empty'}">★</span>`;
    return html;
}

async function submitReview(){
    if(!token){location.href='/pages/login.html';return}
    const content=document.getElementById('reviewText').value.trim();
    if(!content){alert('Vui lòng nhập nội dung');return}
    const cid=localStorage.getItem('customer_id')||0;
    try{
        const r=await authFetch(API+'/comments/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({book_id:parseInt(bookId),customer_id:parseInt(cid),content:content,rating:selectedRating})});
        if(r.ok){document.getElementById('reviewText').value='';loadReviews()}
        else{const d=await r.json();alert(JSON.stringify(d))}
    }catch(e){alert('Lỗi gửi đánh giá')}
}

loadBook();
loadReviews();
</script>
</body>
</html>
